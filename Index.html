<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EO Europe — Chapter Map 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #e8e4df;
    overflow: hidden;
  }

  #map {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  /* ── Header ── */
  .ui-header {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(7, 9, 15, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(198, 155, 60, 0.35);
    border-radius: 5px;
    padding: 11px 30px 10px;
    text-align: center;
    white-space: nowrap;
  }

  .ui-header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 5px;
    color: #C69B3C;
    text-transform: uppercase;
  }

  .ui-header p {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: rgba(255, 255, 255, 0.38);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Stats Panel ── */
  .ui-stats {
    position: absolute;
    bottom: 28px;
    left: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-card {
    background: rgba(7, 9, 15, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(198, 155, 60, 0.25);
    border-radius: 5px;
    padding: 10px 16px;
    min-width: 120px;
  }

  .stat-card .val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: #C69B3C;
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 9px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.38);
    margin-top: 3px;
  }

  /* ── Legend ── */
  .ui-legend {
    position: absolute;
    bottom: 28px;
    right: 20px;
    z-index: 1000;
    background: rgba(7, 9, 15, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(198, 155, 60, 0.25);
    border-radius: 5px;
    padding: 12px 16px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.5px;
    line-height: 2;
  }

  .ui-legend strong {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(198, 155, 60, 0.7);
    margin-bottom: 4px;
  }

  .legend-dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    border: 1.5px solid rgba(255,255,255,0.6);
  }

  /* ── Leaflet Overrides ── */
  .leaflet-control-zoom {
    border: none !important;
    box-shadow: none !important;
    margin-bottom: 0 !important;
  }

  .leaflet-control-zoom a {
    background: rgba(7, 9, 15, 0.9) !important;
    color: rgba(198, 155, 60, 0.85) !important;
    border: 1px solid rgba(198, 155, 60, 0.25) !important;
    width: 30px !important;
    height: 30px !important;
    line-height: 28px !important;
    font-size: 16px !important;
    transition: all 0.15s ease;
  }

  .leaflet-control-zoom a:hover {
    background: rgba(198, 155, 60, 0.12) !important;
    color: #C69B3C !important;
  }

  .leaflet-control-attribution {
    background: rgba(7, 9, 15, 0.6) !important;
    color: rgba(255, 255, 255, 0.2) !important;
    font-size: 9px !important;
    border-radius: 3px 0 0 0 !important;
  }

  .leaflet-control-attribution a {
    color: rgba(198, 155, 60, 0.4) !important;
  }

  /* ── Chapter Marker — Standard ── */
  .ch-dot {
    width: 13px;
    height: 13px;
    background: #C69B3C;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.75);
    cursor: pointer;
    position: relative;
    transition: transform 0.15s ease, background 0.15s ease;
    animation: pulse-gold 2.8s ease-out infinite;
  }

  .ch-dot:hover {
    background: #fff;
    transform: scale(1.5);
    animation: none;
  }

  @keyframes pulse-gold {
    0%   { box-shadow: 0 0 0 0 rgba(198, 155, 60, 0.55); }
    60%  { box-shadow: 0 0 0 9px rgba(198, 155, 60, 0); }
    100% { box-shadow: 0 0 0 0 rgba(198, 155, 60, 0); }
  }

  /* ── Chapter Marker — Top 5 Growth Spotlight ── */
  .ch-dot-spotlight {
    width: 19px;
    height: 19px;
    background: #34d399;
    border-radius: 50%;
    border: 2.5px solid #fff;
    cursor: pointer;
    transition: transform 0.15s ease;
    animation: pulse-green 1.8s ease-out infinite;
    box-shadow: 0 0 10px rgba(52, 211, 153, 0.6);
  }

  .ch-dot-spotlight:hover {
    background: #fff;
    transform: scale(1.45);
    animation: none;
    box-shadow: 0 0 18px rgba(52, 211, 153, 0.9);
  }

  @keyframes pulse-green {
    0%   { box-shadow: 0 0 10px rgba(52,211,153,0.6), 0 0 0 0 rgba(52,211,153,0.5); }
    60%  { box-shadow: 0 0 10px rgba(52,211,153,0.6), 0 0 0 14px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 10px rgba(52,211,153,0.6), 0 0 0 0 rgba(52,211,153,0); }
  }

  /* Spotlight badge inside popup */
  .pop-spotlight-badge {
    display: inline-block;
    background: rgba(52, 211, 153, 0.14);
    border: 1px solid rgba(52, 211, 153, 0.4);
    color: #34d399;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    border-radius: 3px;
    padding: 2px 7px;
    margin-top: 6px;
  }

  /* Spotlight popup gets green border accent */
  .leaflet-popup.sp-popup .leaflet-popup-content-wrapper {
    border-color: rgba(52, 211, 153, 0.5) !important;
  }

  .leaflet-popup.sp-popup .pop-head {
    border-bottom-color: rgba(52, 211, 153, 0.2) !important;
  }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    background: #0d1020 !important;
    border: 1px solid rgba(198, 155, 60, 0.4) !important;
    border-radius: 6px !important;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7) !important;
    padding: 0 !important;
    overflow: hidden;
    color: white;
  }

  .leaflet-popup-tip {
    background: rgba(198, 155, 60, 0.4) !important;
    box-shadow: none !important;
  }

  .leaflet-popup-close-button {
    display: none !important;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    width: 230px !important;
    line-height: 1;
  }

  .pop-head {
    background: linear-gradient(135deg, #131828 0%, #0f1420 100%);
    border-bottom: 1px solid rgba(198, 155, 60, 0.25);
    padding: 13px 15px 11px;
  }

  .pop-head h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #C69B3C;
    text-transform: uppercase;
  }

  .pop-chair {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.45);
    margin-top: 4px;
  }

  .pop-chair span {
    color: rgba(255, 255, 255, 0.7);
  }

  .pop-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }

  .pop-stat {
    padding: 13px 8px 12px;
    text-align: center;
    border-right: 1px solid rgba(255, 255, 255, 0.06);
  }

  .pop-stat:last-child { border-right: none; }

  .pop-stat .sv {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
    line-height: 1;
  }

  .pop-stat .sv.up   { color: #4ade80; }
  .pop-stat .sv.down { color: #f87171; }
  .pop-stat .sv.tbc  { color: rgba(255,255,255,0.25); font-size: 14px; }

  .pop-stat .sk {
    font-size: 8.5px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="ui-header">
  <h1>EO Europe</h1>
  <p>Chapter Overview &middot; 2026</p>
</div>

<!-- Stats Panel -->
<div class="ui-stats">
  <div class="stat-card">
    <div class="val">26</div>
    <div class="lbl">Chapters</div>
  </div>
  <div class="stat-card">
    <div class="val">2,222</div>
    <div class="lbl">Total Members</div>
  </div>
  <div class="stat-card">
    <div class="val">278</div>
    <div class="lbl">New Joins</div>
  </div>
</div>

<!-- Legend -->
<div class="ui-legend">
  <strong>Legend</strong>
  <div><span class="legend-dot" style="background:#34d399;border-color:#fff;"></span> Top 5 Growth</div>
  <div><span class="legend-dot" style="background:#C69B3C;"></span> EO Chapter</div>
  <div style="color:rgba(255,255,255,0.28);font-size:9px;margin-top:6px;">Hover a marker to view details</div>
</div>

<div id="map"></div>

<script>
  // ── Chapter Data — growth = new joins / July 2025 base ──
  const chapters = [
    { name: "EO Suisse Romande", lat: 46.2044, lng:  6.1432, members:  48, newJoins:  5, growth:  11.4 },
    { name: "EO Turkey",         lat: 41.0082, lng: 28.9784, members:  75, newJoins: 13, growth:  21.0 },
    { name: "EO Poland",         lat: 52.2297, lng: 21.0122, members:  64, newJoins: 13, growth:  26.0, spotlight: true },
    { name: "EO Italy",          lat: 41.9028, lng: 12.4964, members:  17, newJoins:  1, growth:   6.2 },
    { name: "EO Portugal",       lat: 38.7223, lng: -9.1393, members:  31, newJoins:  6, growth:  24.0 },
    { name: "EO Ireland",        lat: 53.3498, lng: -6.2603, members:  50, newJoins:  5, growth:  11.1 },
    { name: "EO Paris",          lat: 48.8566, lng:  2.3522, members:  33, newJoins:  9, growth:  36.0, spotlight: true },
    { name: "EO Russia",         lat: 55.7558, lng: 37.6173, members:  45, newJoins:  5, growth:  12.5 },
    { name: "EO Romania",        lat: 44.4268, lng: 26.1025, members:  13, newJoins:  1, growth:   8.3 },
    { name: "EO Bulgaria",       lat: 42.6977, lng: 23.3219, members:  23, newJoins:  3, growth:  15.0 },
    { name: "EO Israel",         lat: 32.0853, lng: 34.7818, members:  51, newJoins:  9, growth:  22.0 },
    { name: "EO Austria",        lat: 48.2082, lng: 16.3738, members:  35, newJoins:  7, growth:  25.0, spotlight: true },
    { name: "EO Belgium",        lat: 50.8503, lng:  4.3517, members:  22, newJoins:  3, growth:  16.7 },
    { name: "EO Zurich",         lat: 47.3769, lng:  8.5417, members: 140, newJoins: 18, growth:  14.8 },
    { name: "EO Barcelona",      lat: 41.3851, lng:  2.1734, members:  96, newJoins: 21, growth:  28.4, spotlight: true },
    { name: "EO London",         lat: 51.5074, lng: -0.1278, members:  75, newJoins: 18, growth:  30.0, spotlight: true },
    { name: "EO Berlin",         lat: 52.5200, lng: 13.4050, members: 302, newJoins: 27, growth:   9.8 },
    { name: "EO Munich",         lat: 48.1351, lng: 11.5820, members: 163, newJoins: 20, growth:  14.1 },
    { name: "EO Netherlands",    lat: 52.3676, lng:  4.9041, members: 258, newJoins: 29, growth:  12.6 },
    { name: "EO Madrid",         lat: 40.4168, lng: -3.7038, members:  68, newJoins: 10, growth:  17.9 },
    { name: "EO Greece",         lat: 37.9838, lng: 23.7275, members: 112, newJoins: 10, growth:   9.8 },
    { name: "EO Germany RR",     lat: 51.4332, lng:  7.6616, members: 133, newJoins:  9, growth:   7.4 },
    { name: "EO Germany SW",     lat: 48.7758, lng:  9.1829, members: 119, newJoins: 15, growth:  14.2 },
    { name: "EBC",               lat: 50.1109, lng:  8.6821, members:  78, newJoins:  3, growth:   4.2 },
    { name: "EO Hamburg",        lat: 53.5511, lng:  9.9937, members: 156, newJoins: 16, growth:  11.4 },
    { name: "EO Cyprus",         lat: 35.1264, lng: 33.4299, members:  15, newJoins:  3, growth:  25.0 },
  ];

  // ── Map Init ─────────────────────────────────────────────────
  const map = L.map('map', {
    center: [50.0, 18.0],
    zoom: 4,
    minZoom: 3,
    maxZoom: 10,
    zoomControl: true,
    attributionControl: true,
  });

  // Dark CartoDB tiles
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // Reposition zoom control
  map.zoomControl.setPosition('bottomleft');

  // ── Markers ──────────────────────────────────────────────────
  function growthClass(g) {
    if (g === null) return 'tbc';
    return g >= 0 ? 'up' : 'down';
  }

  function growthDisplay(g) {
    if (g === null) return '–';
    const sign = g >= 0 ? '+' : '';
    return sign + g + '%';
  }

  chapters.forEach(ch => {
    const isSpotlight = !!ch.spotlight;
    const dotClass = isSpotlight ? 'ch-dot-spotlight' : 'ch-dot';
    const dotSize  = isSpotlight ? 19 : 13;
    const dotAnchor = isSpotlight ? 9 : 6;

    const icon = L.divIcon({
      className: '',
      html: `<div class="${dotClass}"></div>`,
      iconSize: [dotSize, dotSize],
      iconAnchor: [dotAnchor, dotAnchor],
      popupAnchor: [0, isSpotlight ? -13 : -10],
    });

    const badge = isSpotlight
      ? `<div class="pop-spotlight-badge">&#9650; Top 5 Growth</div>`
      : '';

    const popupHTML = `
      <div class="pop-head">
        <h3>${ch.name}</h3>
        ${badge}
      </div>
      <div class="pop-stats">
        <div class="pop-stat">
          <div class="sv">${ch.members}</div>
          <div class="sk">Members</div>
        </div>
        <div class="pop-stat">
          <div class="sv">${ch.newJoins}</div>
          <div class="sk">New Joins</div>
        </div>
        <div class="pop-stat">
          <div class="sv ${growthClass(ch.growth)}">${growthDisplay(ch.growth)}</div>
          <div class="sk">Growth</div>
        </div>
      </div>
    `;

    const marker = L.marker([ch.lat, ch.lng], { icon })
      .addTo(map)
      .bindPopup(popupHTML, {
        closeButton: false,
        autoClose: true,
        closeOnClick: false,
        maxWidth: 260,
        className: isSpotlight ? 'sp-popup' : '',
      });

    let closeTimer;

    marker.on('mouseover', function () {
      clearTimeout(closeTimer);
      this.openPopup();
    });

    marker.on('mouseout', function () {
      const self = this;
      closeTimer = setTimeout(() => self.closePopup(), 220);
    });

    // Keep popup open if mouse moves into it
    marker.on('popupopen', function (e) {
      const popup = e.popup.getElement();
      if (popup) {
        popup.addEventListener('mouseenter', () => clearTimeout(closeTimer));
        popup.addEventListener('mouseleave', () => {
          closeTimer = setTimeout(() => marker.closePopup(), 220);
        });
      }
    });
  });
</script>
</body>
</html>
